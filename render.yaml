services:
  - type: web
    name: portfolio-quality-tracker
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build && npm rebuild better-sqlite3 --build-from-source
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: true
    disk:
      name: portfolio-data
      mountPath: /data
      sizeGB: 1
